# Air configuration file for Windows

root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = ".\\tmp\\main.exe"
  cmd = "go build -o .\\tmp\\main.exe .\\cmd\\api\\main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "migrations", "docs", "scripts", "deployments"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = true
  poll_interval = 1000
  post_cmd = []
  pre_cmd = []
  send_interrupt = true
  stop_on_error = false
  entrypoint = ".\\tmp\\main.exe"

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true