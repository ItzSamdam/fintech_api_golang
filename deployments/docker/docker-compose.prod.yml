version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fintech_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - fintech_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: fintech_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - fintech_network
    restart: always

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: fintech_api_prod
    environment:
      PORT: ${PORT:-8080}
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - fintech_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: fintech_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - fintech_network
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  fintech_network:
    driver: bridge